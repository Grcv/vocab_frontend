<div class="spelling-exercise">
  <!-- BOTÓN CERRAR -->
  <button class="close-btn" (click)="onCancel()">
    ✕
  </button>
  <p class="instruction instruction--emphasis">
    Escucha la palabra y escríbela correctamente
  </p>

  <!-- AUDIO -->
  <div class="audio-box">
    <button
      class="audio-btn"
      (click)="playAudio()"
      [class.playing]="state.playing"
      [disabled]="state.isCorrect">
      🔊 Escuchar palabra
    </button>
  </div>

  <!-- TARJETA DE LETRAS -->
  @if (letters.length) {
    <div class="letters-card" (click)="focusInput()">
      <div class="letters">
        @for (letter of letters; track letter; let i = $index) {
          <div
            class="letter-box"
            [class.filled]="state.input[i]"
            [class.active]="i === state.input.length && !state.isCorrect"
            [class.correct]="state.isCorrect"
            [class.wrong]="!state.isCorrect && state.input.length === letters.length">
            {{ state.input[i] || '' }}
          </div>
        }
      </div>
    </div>
  }

  <!-- INPUT INVISIBLE -->
  <input
    #spellingInput
    type="text"
    class="hidden-input"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    [value]="state.input"
    [attr.maxlength]="letters.length"
    (input)="onInputChange($any($event.target).value)"
    [disabled]="state.isCorrect"
    />

    <!-- FEEDBACK -->
    @if (state.input.length === letters.length) {
      <p
        class="feedback"
        [class.correct]="state.isCorrect"
        [class.wrong]="!state.isCorrect">
        {{ state.isCorrect ? '¡Correcto!' : 'Intenta de nuevo' }}
      </p>
    }

  </div>
