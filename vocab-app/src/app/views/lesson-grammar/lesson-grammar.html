@if (grammar) {
  <div class="lesson-card fade-in">
    <!-- BOTÓN CERRAR -->
    <button class="close-btn" (click)="onCancel()">
      ✕
    </button>
    <span class="badge">{{ grammar.cefr }}</span>
    <h2 class="grammar-title">
      {{ grammar.theme }}
    </h2>
    <p class="subcategory">
      {{ grammar.category }} • {{ grammar.subtheme }}
    </p>
    <!-- EXPLICACIÓN -->
    <div class="explain-box">
      <p>{{ grammar.explain }}</p>
    </div>
    <!-- FÓRMULA -->
    @if (grammar.formula) {
      <div class="formula-box">
        <strong>Fórmula:</strong>
        <p>{{ grammar.formula }}</p>
      </div>
    }
    <!-- EJEMPLOS -->
    <div class="examples">
      <div class="example">
        <p class="example-en">{{ grammar.example_en }}</p>
        @if (grammar.ipa) {
          <p class="ipa">
            {{ grammar.ipa }}
          </p>
        }
        <p class="example-es">{{ grammar.example_es }}</p>
      </div>
    </div>
    <!-- AUDIO -->
    <button
      class="audio-btn"
      [class.playing]="isPlaying"
      (click)="playAudio()">
      🔊 Escuchar ejemplo
    </button>
    <!-- MARCAR -->
    <button
      class="learned-btn"
      [class.active]="markedAsLearned"
      (click)="markAsLearned()">
      ✔ {{ markedAsLearned ? 'Aprendido' : 'Marcar como aprendido' }}
    </button>
    <button class="continue-btn" (click)="continue()">
      Continuar →
    </button>
  </div>
}
