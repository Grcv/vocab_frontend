<div *ngIf="grammar" class="lesson-card fade-in">

  <span class="badge">{{ grammar.cefr }}</span>

  <h2 class="grammar-title">
    {{ grammar.theme }}
  </h2>

  <p class="subcategory">
    {{ grammar.category }} • {{ grammar.subtheme }}
  </p>

  <!-- EXPLICACIÓN -->
  <div class="explain-box">
    <p>{{ grammar.explain }}</p>
  </div>

  <!-- FÓRMULA -->
  <div class="formula-box" *ngIf="grammar.formula">
    <strong>Fórmula:</strong>
    <p>{{ grammar.formula }}</p>
  </div>

  <!-- EJEMPLOS -->
  <div class="examples">

    <div class="example">
      <p class="example-en">{{ grammar.example_en }}</p>
      <p class="ipa" *ngIf="grammar.ipa">
        {{ grammar.ipa }}
      </p>
      <p class="example-es">{{ grammar.example_es }}</p>
    </div>

  </div>

  <!-- AUDIO -->
  <button
    class="audio-btn"
    [class.playing]="isPlaying"
    (click)="playAudio()">
    🔊 Escuchar ejemplo
  </button>

  <!-- MARCAR -->
  <button
    class="learned-btn"
    [class.active]="markedAsLearned"
    (click)="markAsLearned()">
    ✔ {{ markedAsLearned ? 'Aprendido' : 'Marcar como aprendido' }}
  </button>

  <button class="continue-btn" (click)="continue()">
    Continuar →
  </button>

</div>
