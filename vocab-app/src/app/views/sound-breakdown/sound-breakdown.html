<div class="sound-breakdown-page">

  <h2>🔍 Pronunciemos la palabra</h2>

  <div class="word">
    {{ word }}
  </div>

  <p class="instruction">
    Escucha y practica cada sonido por separado:
  </p>

  <div class="sounds">
    @for (sound of soundGroups; track sound) {
      <span class="sound-chip">
        {{ sound }}
      </span>
    }
  </div>

  <button class="btn btn-primary mt-4" (click)="goBack()">
    🔁 Volver a practicar
  </button>

</div>
