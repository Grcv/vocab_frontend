<div class="tabs-container">

  <!-- CONTENT -->
  <div class="tabs-content">

    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.value"
      (click)="setTab(tab.value)">

      {{ tab.label }}

    </button>
    <app-vocabulary-list
      [type]="activeTab">
    </app-vocabulary-list>

  </div>

</div>
