<div class="dashboard-container">

  <!-- HEADER -->
  <div class="header">
    <div class="title-section">
      <h1>Dashboard General</h1>
      <p class="subtitle">Resumen general de tu progreso</p>
    </div>

    <div class="global-progress-card">
      <div class="progress-info">
        <div>
          <span class="label">Progreso Total</span>
          <strong>{{ globalProgress }}%</strong>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress"
          [style.width.%]="globalProgress">
        </div>
      </div>
    </div>
  </div>

  <!-- MODULES -->
  <div class="modules-grid">
    @for (module of modules; track module) {
      <div class="module-card">
        <div class="card-top">
          <div class="icon">{{ module.icon }}</div>
          <div class="title-block">
            <h2>{{ module.title }}</h2>
            <span class="mini-progress">
              {{ progress(module) }}%
            </span>
          </div>
        </div>
        <div class="stats">
          <span>{{ module.completed }}</span>
          <span class="divider">/</span>
          <span>{{ module.total }}</span>
        </div>
        <div class="progress-bar small">
          <div class="progress"
            [style.width.%]="progress(module)">
          </div>
        </div>
        <a [routerLink]="['/', module.route]" class="go-dashboard-btn">
          Abrir módulo →
        </a>
      </div>
    }
  </div>

</div>
