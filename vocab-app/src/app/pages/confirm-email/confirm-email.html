<div class="confirm-container">

  @if (loading) {
    <div class="loader">
      Confirmando tu cuenta...
    </div>
  }

  @if (message) {
    <div class="success-box">
      <h2>¡Correo confirmado!</h2>
      <p>{{ message }}</p>
      <small>Redirigiendo al login...</small>
    </div>
  }

  @if (error) {
    <div class="error-box">
      <h2>Error</h2>
      <p>{{ error }}</p>
      <button routerLink="/login">Ir al login</button>
    </div>
  }

</div>
