<div class="tabs-container">

  <!-- TABS HEADER -->
  <div class="tabs-header">

    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.value"
      (click)="setTab(tab.value)">

      {{ tab.label }}

    </button>

  </div>

  <!-- CONTENT -->
  <div class="tabs-content">

    <app-progress
      [type]="activeTab">
    </app-progress>

  </div>

</div>
