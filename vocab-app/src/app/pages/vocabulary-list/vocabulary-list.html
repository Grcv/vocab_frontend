<div class="vocabulary-page">

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h2>Contenido pendiente</h2>
      <p class="subtitle">Gestiona los elementos que aún no dominas</p>
    </div>

    <div class="counter">
      {{ filteredWords.length }} registros
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="modern-card">

    <!-- FILTROS DINÁMICOS -->
    <div class="filters-row">

      <ng-container *ngFor="let filter of filters | keyvalue">
        <input
          class="filter-input"
          [placeholder]="filter.key | titlecase"
          [(ngModel)]="filters[filter.key]"
          (input)="applyFilters()">
      </ng-container>

      <button class="clear-btn" (click)="resetFilters()">
        Limpiar
      </button>

    </div>

    <!-- TABLA DINÁMICA -->
    <div class="table-wrapper">
      <table class="modern-table">

        <thead>
          <tr>
            <th *ngFor="let column of columns">
              {{ column | titlecase }}
            </th>
            <th class="text-center">✔</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of paginatedWords">

            <td *ngFor="let column of columns">
              {{ item[column] }}
            </td>

            <td class="text-center">
              <input
                *ngIf="item.id"
                type="checkbox"
                class="modern-checkbox"
                [checked]="selectedWordIds.has(item.id)"
                (change)="toggleWord(item.id, $event)">
            </td>

          </tr>

          <tr *ngIf="paginatedWords.length === 0">
            <td [attr.colspan]="columns.length + 1" class="empty-state">
              No hay resultados
            </td>
          </tr>

        </tbody>

      </table>
    </div>

  </div>

  <!-- PAGINACIÓN -->
  <div class="pagination-bar">

    <div class="page-size">
      <span>Mostrar</span>
      <select [(ngModel)]="pageSize" (change)="changePageSize()">
        <option *ngFor="let size of pageSizes" [value]="size">
          {{ size }}
        </option>
      </select>
    </div>

    <div class="pager">
      <button (click)="prevPage()" [disabled]="currentPage === 1">←</button>
      <span>Página {{ currentPage }} de {{ totalPages }}</span>
      <button (click)="nextPage()" [disabled]="currentPage === totalPages">→</button>
    </div>

    <button
      class="save-btn"
      (click)="saveProgress()"
      [disabled]="selectedWordIds.size === 0">
      Guardar cambios
    </button>

  </div>

</div>
