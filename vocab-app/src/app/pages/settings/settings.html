<div class="settings">

  <h1>⚙️ Ajustes</h1>

  <!-- 👤 PERFIL -->
  <section class="card">
    <h2>Perfil</h2>

    <label>
      Usuario
      <input
        type="text"
        [ngModel]="userName"
        disabled
        class="readonly-input"
      />
    </label>
  </section>

  <!-- ⭐ PLAN -->
  <section class="card premium-card" [class.active]="isPremium">
    <h2>Plan</h2>

    <div class="premium-status">
      <span class="badge" [class.premium]="isPremium">
        {{ isPremium ? '⭐ Premium' : 'Free' }}
      </span>

      <p *ngIf="isPremium" class="premium-text">
        Acceso completo a todos los niveles y ejercicios 🎉
      </p>

      <p *ngIf="!isPremium" class="premium-text muted">
        Estás usando la versión gratuita
      </p>
    </div>

    <button
      *ngIf="!isPremium"
      class="upgrade-btn"
      (click)="goPremium()"
    >
      🚀 Mejorar a Premium
    </button>
  </section>

  <!-- 🧠 PERFIL DE APRENDIZAJE -->
  <section class="card">
    <h2>Modo de aprendizaje</h2>

    <select [(ngModel)]="learningProfile">
      <option value="casual">Casual (repaso)</option>
      <option value="normal">Normal (recomendado)</option>
      <option value="intensive">Intensivo (rápido)</option>
      <option value="automatic">Automático (adaptativo)</option>
    </select>

    <small class="hint">
      El modo automático se adapta a tus errores y aciertos
    </small>
  </section>

  <!-- 🔊 AUDIO -->
  <section class="card">
    <h2>Audio</h2>

    <label class="row">
      <span>Reproducir audio automáticamente</span>
      <input type="checkbox" [(ngModel)]="autoPlayAudio" />
    </label>

    <label>
      Velocidad de pronunciación
      <input
        type="range"
        min="0.6"
        max="1.2"
        step="0.1"
        [(ngModel)]="speechRate"
        [disabled]="!isPremium"
      />
      <span class="hint">{{ speechRate }}x</span>

      <small *ngIf="!isPremium" class="muted">
        Disponible solo para usuarios premium
      </small>
    </label>
  </section>

  <!-- 📚 NIVEL -->
  <section class="card">
    <h2>Nivel</h2>

    <select [(ngModel)]="cefrLevel">
      <option value="A1">A1 – Básico</option>
      <option value="A2">A2 – Básico avanzado</option>
      <option value="B1">B1 – Intermedio</option>
      <option value="B2">B2 – Intermedio alto</option>
      <option value="C1">C1 – Avanzado</option>
    </select>
  </section>

  <button class="save-btn" (click)="save()">
    💾 Guardar cambios
  </button>

</div>
